name: Build eza for Debian

on:
  workflow_dispatch:
    inputs:
      eza_version:
        description: The version of eza to build.
        type: string
        required: true
      build_version:
        description: The build version.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-eza:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eza-debian
        uses: actions/checkout@v4

      - name: Validate upstream license permits paid distribution
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./validate_license.sh ${{ inputs.eza_version }}

      - name: Build eza
        run: ./build.sh ${{ inputs.eza_version }} ${{ inputs.build_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: eza_*.deb

  build-src:
    name: Build Source Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eza-debian
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev devscripts wget ca-certificates

      - name: Build source packages
        run: ./build_src.sh ${{ inputs.eza_version }} ${{ inputs.build_version }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-artifact
          path: |
            eza_*.dsc
            eza_*.orig.tar.gz
            eza_*.debian.tar.xz

  release-eza:
    name: Release eza for Debian
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-eza, build-src]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Download Source Artifacts
        uses: actions/download-artifact@v4
        with:
          name: source-artifact

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            eza_*.deb
            eza_*.dsc
            eza_*.orig.tar.gz
            eza_*.debian.tar.xz
          name: ${{ inputs.eza_version }}+${{ inputs.build_version }}
          tag_name: ${{ inputs.eza_version }}+${{ inputs.build_version }}
          fail_on_unmatched_files: true
